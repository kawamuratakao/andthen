<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyrics Site</title>
  <style>
    :root {
      --bg: #0f0c12;
      --text: #f6f1f7;
      --muted: #cbbdcc;
      --faint: #9d8fa0;
      --line: rgba(255,255,255,0.12);
      --accent: #e8b7c8;
      --shadow: 0 18px 48px rgba(0,0,0,0.38);
      --radius: 20px;
      --max: 960px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(185,154,217,0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(232,183,200,0.14), transparent 30%),
        linear-gradient(180deg, #1a131d 0%, #110d14 35%, #0c0a0f 100%);
      line-height: 1.8;
      letter-spacing: 0.02em;
    }

    .wrap {
      width: min(calc(100% - 24px), var(--max));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .hero {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 8px);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.15;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    ul.song-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 14px;
    }

    a.card {
      display: block;
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      color: inherit;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: background-color 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    a.card:hover,
    a.card:focus-visible {
      background: rgba(255,255,255,0.08);
      border-color: rgba(232,183,200,0.42);
      transform: translateY(-1px);
      outline: none;
    }

    .title {
      font-size: 1.08rem;
      font-weight: 700;
    }

    .en {
      opacity: 0.72;
      font-weight: 500;
    }

    .meta {
      margin-top: 6px;
      font-size: 0.92rem;
      color: var(--faint);
    }

    @media (max-width: 820px) {
      .wrap {
        width: min(calc(100% - 16px), var(--max));
        padding-top: 18px;
        padding-bottom: 40px;
      }

      .hero {
        padding: 20px 16px;
        border-radius: 18px;
      }

      .subtitle {
        font-size: 0.96rem;
        line-height: 1.75;
      }

      a.card {
        padding: 15px 16px;
      }

      .title {
        font-size: 1rem;
      }

      .meta {
        font-size: 0.86rem;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Lyrics Site</h1>
      <p class="subtitle">対訳歌詞ページの一覧です。</p>
    </section>

    <ul class="song-list">
      <li><a class="card" href="./and-then/"><div class="title">それから <span class="en">And Then</span></div><div class="meta">それからの余韻に寄せて</div></a></li>
      <li><a class="card" href="./the-dancing-girl/"><div class="title">舞姫 <span class="en">The Dancing Girl</span></div><div class="meta">エリスの夜に寄せて</div></a></li>
    </ul>
  </main>
</body>
</html>
